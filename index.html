<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>民法 1094 條：未成年監護風險導航</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d35400;
            --success: #27ae60;
            --light: #f9f9f9;
        }
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #ececec;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .card {
            background: white;
            max-width: 700px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 40px;
        }
        .header {
            text-align: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 30px;
            padding-bottom: 10px;
        }
        .header h1 { color: var(--primary); font-size: 1.5rem; margin: 0; }
        .header p { color: #7f8c8d; font-size: 0.9rem; }
        
        .step { display: none; text-align: center; }
        .step.active { display: block; animation: fadeIn 0.5s; }
        
        .question { font-size: 1.3rem; font-weight: bold; margin-bottom: 25px; color: var(--primary); }
        
        .options { display: flex; flex-direction: column; gap: 15px; }
        button {
            padding: 15px 25px;
            font-size: 1.1rem;
            border: 2px solid var(--primary);
            background: white;
            color: var(--primary);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { background: var(--primary); color: white; }
        
        .result-box {
            background: var(--light);
            border-radius: 15px;
            padding: 25px;
            text-align: left;
            margin-top: 20px;
        }
        .highlight { color: var(--accent); font-weight: bold; }
        .expert-tip {
            margin-top: 25px;
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 15px;
            font-size: 0.95rem;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>民法第 1094 條：監護權大解密</h1>
        <p>當愛無法親自陪伴，法律如何安排孩子的未來？</p>
    </div>

    <div id="step1" class="step active">
        <div class="question">Q1: 若不幸發生意外，父母均不存時...</div>
        <div class="options">
            <button onclick="nextStep(2)">開始評估風險</button>
        </div>
    </div>

    <div id="step2" class="step">
        <div class="question">您是否預先在「遺囑」中指定監護人？</div>
        <div class="options">
            <button onclick="showFinal('will')">是有遺囑指定</button>
            <button onclick="showFinal('court')">否，未留遺囑</button>
        </div>
    </div>

    <div id="final" class="step">
        <div id="result-content" class="result-box"></div>
        
        <div class="expert-tip">
            <strong>💡 王經理專業觀點：</strong><br>
            法律順位僅是底線，並非最優解。強烈建議搭配「保險金信託」，確保理賠金真正用於孩子教育與生活，而非淪為親屬爭產的誘因。
        </div>
        
        <button style="margin-top:25px; font-size:0.9rem;" onclick="location.reload()">重新模擬</button>
    </div>
</div>

<script>
    function nextStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
    }

    function showFinal(type) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        const final = document.getElementById('final');
        const content = document.getElementById('result-content');
        final.classList.add('active');

        if (type === 'will') {
            content.innerHTML = `
                <h3 style="color:var(--success);">✅ 第一順位：遺囑指定人</h3>
                <p>根據民法 1094 條第 1 項，您的指定具有<span class="highlight">最高法律效力</span>。</p>
                <p>這能確保孩子交給您最信任的人，且省去法院調查的冗長程序。</p>
            `;
        } else {
            content.innerHTML = `
                <h3 style="color:var(--accent);">⚠️ 進入法院選定程序</h3>
                <p>若無遺囑，法院將依「子女最佳利益」從以下親屬中選定：</p>
                <ul style="font-size:0.95rem;">
                    <li>1. 同居之祖父母</li>
                    <li>2. 與未成年人同居之兄姊</li>
                    <li>3. 不具同居關係之祖父母</li>
                </ul>
                <p><strong>注意：</strong> 2009年修法後，法院會參考<span class="highlight">社工訪視報告</span>，不再是自動順位遞補。</p>
            `;
        }
    }
</script>

</body>
</html>
